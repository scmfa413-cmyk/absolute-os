<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Absolute OS V2</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #0d0d0d;
      color: white;
      overflow-x: hidden;
    }

    /* Particle background */
    .particles {
      position: fixed;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    /* HERO SECTION */
    .hero {
      text-align: center;
      padding: 100px 20px 40px;
      z-index: 1;
      position: relative;
    }
    .hero h1 {
      font-size: 48px;
      font-weight: bold;
      color: #b86eff;
      text-shadow: 0 0 10px #b86eff;
    }
    .hero p {
      font-size: 18px;
      color: #ccc;
      margin-top: 10px;
    }
    .buttons {
      margin-top: 30px;
    }
    .buttons button {
      background: #b86eff;
      border: none;
      color: white;
      padding: 12px 24px;
      margin: 10px;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      box-shadow: 0 0 10px #b86eff;
      transition: transform 0.2s;
    }
    .buttons button:hover {
      transform: scale(1.05);
    }

    /* Modern Sidebar V2 */
    .sidebar-v2 {
      position: fixed;
      left: 20px;
      top: 50%;
      transform: translateY(-50%);
      width: 70px;
      padding: 20px 10px;
      background: rgba(20, 20, 20, 0.55);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      box-shadow: 0 0 18px #b86eff;
      z-index: 999;
    }

    .side-icon {
      width: 50px;
      height: 50px;
      background: rgba(30, 30, 30, 0.8);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      cursor: pointer;
      transition: 0.25s ease;
      box-shadow: 0 0 6px #b86eff55;
    }

    .side-icon:hover {
      transform: scale(1.12);
      box-shadow: 0 0 12px #b86eff;
    }

    .side-icon.active {
      background: #b86eff33;
      box-shadow: 0 0 14px #b86eff;
      transform: scale(1.15);
    }

    .side-bottom {
      margin-top: 30px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }

    /* Notification */
    .notification {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #1a1a1a;
      color: white;
      padding: 12px 20px;
      border-radius: 8px;
      box-shadow: 0 0 10px #b86eff;
      z-index: 3;
    }
  </style>
</head>

<body>

  <!-- Particle Background -->
  <div class="particles"></div>

  <!-- Modern Sidebar -->
  <div class="sidebar-v2">
    <div class="side-icon" title="Home">🏠</div>
    <div class="side-icon" title="Movies">🎬</div>
    <div class="side-icon" title="Games">🎮</div>
    <div class="side-icon" title="Apps">📱</div>
    <div class="side-icon" title="Proxy">🛡️</div>
    <div class="side-icon" title="Assistant">🤖</div>

    <div class="side-bottom">
      <div class="side-icon" title="Settings">⚙️</div>
      <div class="side-icon" title="Profile">👤</div>
    </div>
  </div>

  <!-- HERO -->
  <div class="hero">
    <h1>Absolute OS is evolving.</h1>
    <p>The next generation of web systems, built for speed, style, and full control.</p>

    <div class="buttons">
      <button>Start Playing</button>
      <button>Enter the Cinema</button>
    </div>
  </div>

  <!-- Notification -->
  <div class="notification">
    Message from System — Absolute OS V2 is live!
  </div>

  <!-- Particle Script -->
  <script>
    const canvas = document.createElement('canvas');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    document.querySelector('.particles').appendChild(canvas);
    const ctx = canvas.getContext('2d');
    const particles = Array.from({ length: 100 }, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 2 + 1,
      d: Math.random() * 1 + 0.5
    }));
    function drawParticles() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#b86eff';
      particles.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();
        p.y += p.d;
        if (p.y > canvas.height) {
          p.y = 0;
          p.x = Math.random() * canvas.width;
        }
      });
      requestAnimationFrame(drawParticles);
    }
    drawParticles();
  </script>

</body>
</html>
