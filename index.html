<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Absolute OS – Start</title>

<style>
  /* GLOBAL */
  body {
    margin: 0;
    background: #000;
    color: #ff2b2b;
    font-family: Consolas, monospace;
    animation: fadeIn 0.6s ease-out;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  /* SIDEBAR */
  .sidebar {
    position: fixed;
    left: 0;
    top: 0;
    bottom: 0;
    width: 180px;
    background: #050505;
    border-right: 1px solid #ff2b2b55;
    padding: 15px;
    box-sizing: border-box;
    animation: slideIn 0.5s ease-out;
  }

  @keyframes slideIn {
    from { transform: translateX(-40px); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }

  .sidebar-title {
    font-weight: bold;
    margin-bottom: 10px;
    color: #ff2b2b;
    text-shadow: 0 0 10px #ff2b2b;
  }

  .side-link {
    display: block;
    margin: 10px 0;
    color: #ff2b2b;
    text-decoration: none;
    font-size: 14px;
    transition: 0.2s;
  }

  .side-link:hover {
    color: #fff;
    text-shadow: 0 0 10px #ff2b2b, 0 0 20px #ff2b2b;
  }

  .side-link.active {
    color: #fff;
    text-shadow: 0 0 15px #ff2b2b;
  }

  /* MAIN CONTENT */
  .container {
    margin-left: 200px;
    padding: 40px;
    min-height: 100vh;
    animation: fadeIn 0.8s ease-out;
  }

  .title {
    font-size: 40px;
    font-weight: bold;
    text-shadow: 0 0 15px #ff2b2b;
    animation: glowPulse 2s infinite alternate;
  }

  @keyframes glowPulse {
    from { text-shadow: 0 0 5px #ff2b2b; }
    to { text-shadow: 0 0 25px #ff2b2b; }
  }
</style>
</head>

<body>

<div class="sidebar">
  <div class="sidebar-title">ABSOLUTE OS</div>

  <a class="side-link active" href="index.html">Start</a>
  <a class="side-link" href="movies.html">Movies</a>

  <a class="side-link" href="about.html">About</a>
  <a class="side-link" href="profile.html">Profile</a>
  <a class="side-link" href="search.html">Private Search</a>
</div>

<div class="container">
  <div class="title">ABSOLUTE OS</div>
</div>

</body>
</html>
