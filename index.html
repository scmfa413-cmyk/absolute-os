<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Absolute OS – Start</title>

<style>
  body {
    margin: 0;
    background: #000;
    color: #ff2b2b;
    font-family: Consolas, monospace;
    white-space: pre-line;
  }

  .hidden {
    display: none;
  }

  #boot-screen {
    padding: 40px;
    font-size: 14px;
  }

  #main-ui {
    display: flex;
  }

  .sidebar {
    width: 180px;
    background: #050505;
    border-right: 1px solid #ff2b2b55;
    padding: 15px;
    box-sizing: border-box;
  }

  .sidebar-title {
    font-weight: bold;
    margin-bottom: 10px;
    color: #ff2b2b;
    text-shadow: 0 0 10px #ff2b2b;
  }

  .side-link {
    display: block;
    margin: 10px 0;
    color: #ff2b2b;
    text-decoration: none;
    font-size: 14px;
  }

  .side-link:hover {
    color: #fff;
    text-shadow: 0 0 10px #ff2b2b;
  }

  .container {
    padding: 40px;
    flex-grow: 1;
  }

  .title {
    font-size: 40px;
    font-weight: bold;
    text-shadow: 0 0 15px #ff2b2b;
  }

  .welcome {
    margin-top: 20px;
    font-size: 14px;
    white-space: pre-line;
  }

  /* CLI */
  #cli-box {
    margin-top: 30px;
    padding: 15px;
    border: 1px solid #ff2b2b55;
    height: 200px;
    overflow-y: auto;
    white-space: pre-line;
  }

  #command-input {
    width: 100%;
    margin-top: 10px;
    padding: 8px;
    background: #000;
    border: 1px solid #ff2b2b55;
    color: #ff2b2b;
    font-family: Consolas;
  }
</style>
</head>

<body>

<!-- BOOT SCREEN -->
<div id="boot-screen">
  <div id="boot-lines"></div>
</div>

<!-- MAIN UI -->
<div id="main-ui" class="hidden">

  <div class="sidebar" id="sidebar">
    <div class="sidebar-title">ABSOLUTE OS</div>

    <a class="side-link active" href="index.html">Start</a>
    <a class="side-link" href="movies.html">Movies</a>
    <a class="side-link" href="games.html">Games</a>
    <a class="side-link" href="about.html">About</a>
    <a class="side-link" href="profile.html">Profile</a>
    <a class="side-link" href="search.html">Private Search</a>
  </div>

  <div class="container">
    <div class="title">ABSOLUTE OS</div>
    <div id="welcome" class="welcome"></div>

    <!-- ⭐ RESTORED CLI -->
    <div id="cli-box">
      <div id="cli-output"></div>
    </div>
    <input id="command-input" placeholder="Enter command...">
  </div>

</div>

<script>
/* BOOT + TYPING */
document.addEventListener("DOMContentLoaded", () => {
  const bootLines = [
    "[ABSOLUTE OS v3.7]",
    "> INITIALIZING KERNEL...",
    "> LOADING SYSTEM DRIVERS...",
    "> WARNING: UNSTABLE MODULE DETECTED",
    "> PATCHING MEMORY SECTORS...",
    "> ESTABLISHING SECURE LINK...",
    "> CONNECTION LOST",
    "> RECONNECTING...",
    "> CONNECTION RESTORED",
    "> SYSTEM ONLINE."
  ];

  const bootEl = document.getElementById("boot-lines");
  const bootScreen = document.getElementById("boot-screen");
  const mainUI = document.getElementById("main-ui");

  let i = 0;

  function nextLine() {
    if (i < bootLines.length) {
      bootEl.textContent += bootLines[i] + "\n";
      i++;
      setTimeout(nextLine, 250);
    } else {
      setTimeout(() => {
        bootScreen.classList.add("hidden");
        mainUI.classList.remove("hidden");
        startWelcomeTyping();
      }, 600);
    }
  }

  nextLine();
});

function startWelcomeTyping() {
  const text = document.getElementById("welcome");
  if (!text) return;

  const message = [
    "Initializing Absolute System...",
    "Loading modules...",
    "Establishing secure connection...",
    "System ready."
  ];

  let line = 0;
  let char = 0;

  function type() {
    if (line < message.length) {
      if (char < message[line].length) {
        text.textContent += message[line].charAt(char);
        char++;
        setTimeout(type, 40);
      } else {
        text.textContent += "\n";
        line++;
        char = 0;
        setTimeout(type, 250);
      }
    }
  }

  type();
}

/* ⭐ RESTORED COMMAND SYSTEM */
document.addEventListener("DOMContentLoaded", () => {
  const input = document.getElementById("command-input");
  const output = document.getElementById("cli-output");
  if (!input || !output) return;

  input.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
      const cmd = input.value.trim();
      handleCommand(cmd, output);
      input.value = "";
    }
  });
});

function handleCommand(cmd, output) {
  if (!cmd) return;

  const lower = cmd.toLowerCase();
  let response = "";

  if (lower === "help") {
    response =
      "Available commands:\n" +
      "  help            - show this help\n" +
      "  open games      - go to games\n" +
      "  open movies     - go to movies\n" +
      "  open about      - go to about\n" +
      "  system.status   - show system status\n" +
      "  clear           - clear output\n";
  } else if (lower === "open games") {
    window.location.href = "games.html";
    return;
  } else if (lower === "open movies") {
    window.location.href = "movies.html";
    return;
  } else if (lower === "open about") {
    window.location.href = "about.html";
    return;
  } else if (lower === "system.status") {
    response =
      "SYSTEM STATUS:\n" +
      "  CORE: STABLE\n" +
      "  NET: LINKED\n" +
      "  USER: ONLINE\n";
  } else if (lower === "clear") {
    output.textContent = "";
    return;
  } else {
    response = `Unknown command: ${cmd}\nType 'help' for a list of commands.\n`;
  }

  output.textContent += `$ ${cmd}\n${response}\n`;
}
</script>

</body>
</html>
