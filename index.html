
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Absolute OS V2</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #0d0d0d;
      color: white;
      overflow: hidden;
    }

    .particles {
      position: fixed;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .hero {
      text-align: center;
      padding: 100px 20px 40px;
      z-index: 1;
      position: relative;
    }

    .hero h1 {
      font-size: 48px;
      font-weight: bold;
      color: #b86eff;
      text-shadow: 0 0 10px #b86eff;
    }

    .hero p {
      font-size: 18px;
      color: #ccc;
      margin-top: 10px;
    }

    .buttons {
      margin-top: 30px;
    }

    .buttons button {
      background: #b86eff;
      border: none;
      color: white;
      padding: 12px 24px;
      margin: 10px;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      box-shadow: 0 0 10px #b86eff;
      transition: transform 0.2s;
    }

    .buttons button:hover {
      transform: scale(1.05);
    }

    .notification {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #1a1a1a;
      color: white;
      padding: 12px 20px;
      border-radius: 8px;
      box-shadow: 0 0 10px #b86eff;
      z-index: 3;
    }

    .sidebar {
      position: fixed;
      top: 0;
      left: -80px;
      width: 80px;
      height: 100%;
      background: rgba(20, 20, 20, 0.6);
      backdrop-filter: blur(10px);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 20px;
      transition: left 0.3s ease;
      z-index: 1000;
    }

    .sidebar:hover {
      left: 0;
    }

    .icon {
      width: 50px;
      height: 50px;
      margin: 10px 0;
      background: rgba(30, 30, 30, 0.8);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 0 6px #b86eff55;
    }

    .icon:hover {
      transform: scale(1.1);
      box-shadow: 0 0 12px #b86eff;
    }

    .icon svg {
      width: 24px;
      height: 24px;
      fill: #b86eff;
    }

    .window {
      position: absolute;
      top: 120px;
      left: 100px;
      width: 80%;
      height: 70%;
      background: rgba(20, 20, 20, 0.9);
      border-radius: 12px;
      box-shadow: 0 0 20px #b86eff;
      backdrop-filter: blur(10px);
      display: none;
      flex-direction: column;
      overflow: hidden;
      z-index: 999;
    }

    .window-header {
      background: #1a1a1a;
      padding: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: move;
    }

    .window-header span {
      font-weight: bold;
      color: #b86eff;
    }

    .close-btn {
      background: #b86eff;
      border: none;
      color: white;
      padding: 4px 10px;
      border-radius: 6px;
      cursor: pointer;
    }

    .window iframe {
      flex: 1;
      border: none;
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>
  <div class="particles"></div>

  <div class="sidebar">
    <div class="icon" onclick="openWindow('home')">
      <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
    </div>
    <div class="icon" onclick="openWindow('movies')">
      <svg viewBox="0 0 24 24"><path d="M18 4l2 4h-3l-2-4h-4l2 4h-3l-2-4H6l2 4H5l-2-4H2v16h20V4z"/></svg>
    </div>
    <div class="icon" onclick="openWindow('games')">
      <svg viewBox="0 0 24 24"><path d="M17 6H7c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h10c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-6 5H9v2H7v-2H5v-2h2V7h2v2h2v2zm6 1c-.55 0-1-.45-1-1s.45-1 1-1 1 .45 1 1-.45 1-1 1z"/></svg>
    </div>
    <div class="icon" onclick="openWindow('apps')">
      <svg viewBox="0 0 24 24"><path d="M3 3h8v8H3V3zm10 0h8v8h-8V3zM3 13h8v8H3v-8zm10 0h8v8h-8v-8z"/></svg>
    </div>
    <div class="icon" onclick="openWindow('assistant')">
      <svg viewBox="0 0 24 24"><path d="M12 2a10 10 0 0 0-10 10c0 5.5 4.5 10 10 10s10-4.5 10-10S17.5 2 12 2zm0 18c-4.4 0-8-3.6-8-8s3.6-8 8-8 8 3.6 8 8-3.6 8-8 8z"/><circle cx="12" cy="14" r="1.5"/><path d="M11 6h2v6h-2z"/></svg>
    </div>
    <div class="icon" onclick="openWindow('proxy')">
      <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></svg>
    </div>
    <div class="icon" onclick="openWindow('settings')">
      <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.31.06-.63.06-.94s-.02-.63-.06-.94l2.03-1.58a.5.5 0 0 0 .11-.64l-1.92-3.32a.5.5 0 0 0-.61-.22l-2.39.96a7.007 7.007 0 0 0-1.63-.94l-.36-2.54A.5.5 0 0 0 14.5 2h-5a.5.5 0 0 0-.5.42l-.36 2.54c-.6.23-1.16.54-1.63.94l-2.39-.96a.5.5 0 0 0-.61.22L2.72 8.88a.5.5 0 0 0 .11.64l2.03 1.58c-.04.31-.06.63-.06.94s.02.63.06.94L2.83 14.94a.5.5 0 0 0-.11.64l1.92 3.32c.14.24.43.34.68.22l2.39-.96c.47.4 1.03.71 1.63.94l.36 2.54c.05.27.27.42.5.42h5c.23 0 .45-.15.5-.42l.36-2.54c.6-.23 1.16-.54 1.63-.94l2.39.96c.25.12.54.02.68-.22l1.92-3.32a.5.5 0 0 0-.11-.64l-2.03-1.58zM12 15.5c-1.93 0-3.5-1.57-3.5-3.5S10.07 8.5 12 8.5s3.5 1.57 3.5 3.5-1.57 3.5-3.5 3.5z"/></svg>
    </div>
    <div class="icon" onclick="openWindow('profile')">
      <svg viewBox="0 0 24 24"><path d="M12 12c2.7 0 5-2.3 5-5s-2.3-5-5-5-5 2.3-5 5 2.3 5 5 5zm0 2c-3.3 0-10 1.7-10 5v3h20v-3c0-3.3-6.7-5-10-5z"/></svg>
    </div>
  </div>

  <div class="hero">
    <h1>Absolute OS is evolving.</h1>
    <p>The next generation of web systems, built for speed, style, and full control.</p>
    <div class="buttons">
      <button onclick="openWindow('games')">Start Playing</button>
      <button onclick="openWindow('movies')">Enter the Cinema</button>
    </div>
  </div>

  <div class="notification">
    Message from System — Absolute OS V2 is live!
  </div>

  <div id="window-games" class="window">
    <div class="window-header">
      <span>Games</span>
      <button class="close-btn" onclick="closeWindow('games')">Close</button>
    </div>
    <iframe src="https://www.onlinegames.io"></iframe>
  </div>

  <div id="window-movies" class="window">
    <div class="window-header">
      <span>Movies</span>
      <button class="close-btn" onclick="closeWindow('movies')">Close</button>
    </div>
    <iframe src="https://cine-hub-blocked.netlify.app"></iframe>
  </div>

  <script>
    function openWindow(name) {
      document.querySelectorAll('.window').forEach(w => w.style.display = 'none');
      const win = document.getElementById('window-' + name);
      if (win) win.style.display = 'flex';
    }

    function closeWindow(name) {
      const win = document.getElementById('window-' + name);
      if (win) win.style.display = 'none';
    }

    // Particle background
    const canvas = document.createElement('canvas');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    document.querySelector('.particles').appendChild(canvas);
    const ctx = canvas.getContext('2d');
    const particles = Array.from({ length: 100 }, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 2 + 1,
      d: Math.random() * 1 + 0.5
    }));
    function drawParticles() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#b86eff';
      particles.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();
        p.y += p.d;
        if (p.y > canvas.height) {
          p.y = 0;
          p.x = Math.random() * canvas.width;
        }
      });
      requestAnimationFrame(drawParticles);
    }
    drawParticles();
  </script>
</body>
</html>
