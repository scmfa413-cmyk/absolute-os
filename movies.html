    margin-right: 5px;
  }

  .filter-btn.active {
    background: #ff2b2b;
    color: #000;
  }

    background: #111;
    border: 1px solid #ff2b2b55;
    color: #ff2b2b;
    padding: 6px;
    width: 260px;
    margin-bottom: 10px;
  }

  #movie-grid, #series-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 10px;
  }

  .card {
    background: #111;
    border: 1px solid #ff2b2b33;
    padding: 10px;
    cursor: pointer;
  }

  .card-title {
    font-size: 14px;
    color: #ff0000;
    margin-bottom: 5px;
  }

  .card-genre {
    font-size: 11px;
    color: #660000;
  }

  .section-title {
    display: inline-block;
    padding: 6px 12px;
    border: 1px solid #ff2b2b;
    color: #ff2b2b;
    text-shadow: 0 0 8px #ff0000;
    margin-top: 40px;
    margin-bottom: 10px;
    font-size: 20px;
    letter-spacing: 1px;
  }

  #movie-viewer {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.9);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #movie-viewer.hidden {
    display: none;
  }

  #movie-frame {
    width: 80%;
    height: 80%;
    border: 2px solid #ff2b2b;
  }

  #close-movie {
    position: absolute;
    top: 20px;
    right: 20px;
    background: #ff2b2b;
    color: #000;
    padding: 8px 12px;
    cursor: pointer;
    border: none;
  }

  const mGrid = document.getElementById('movie-grid');
  const sGrid = document.getElementById('series-grid');
  const viewer = document.getElementById('movie-viewer');
  const frame = document.getElementById('movie-frame');
  const search = document.getElementById('movie-search');

  function createCard(item, type) {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-title">${item.t.toUpperCase()}</div>
      <div class="card-genre">${item.g.toUpperCase()}</div>
    `;
    card.onclick = function() {
      frame.src = `https://vidsrc.to/embed/${type}/${item.id}`;
      viewer.classList.remove('hidden');
    };
    return card;
  }

  function render(filter = 'all') {
    mGrid.innerHTML = '';
    sGrid.innerHTML = '';

    peliculas.forEach(p => {
      if (filter === 'all' || p.g === filter)
        mGrid.appendChild(createCard(p, 'movie'));
    });

    series.forEach(s => {
      if (filter === 'all' || s.g === filter)
        sGrid.appendChild(createCard(s, 'tv'));
    });
  }

  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.onclick = function() {
      document.querySelector('.filter-btn.active')?.classList.remove('active');
      btn.classList.add('active');
      render(btn.dataset.genre);
    };
  });

  search.oninput = function(e) {
    const val = e.target.value.toLowerCase();
    document.querySelectorAll('.card').forEach(c => {
      c.style.display = c.innerText.toLowerCase().includes(val) ? '' : 'none';
    });
  };

  document.getElementById('close-movie').onclick = function() {
    viewer.classList.add('hidden');
    frame.src = '';
  };

  render();

})();
</script>
