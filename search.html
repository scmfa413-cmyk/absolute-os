<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Absolute OS – Private Searcher</title>

<style>
  body {
    margin: 0;
    background: #000;
    color: #ff2b2b;
    font-family: Consolas, monospace;
  }

  .sidebar {
    position: fixed;
    left: 0;
    top: 0;
    bottom: 0;
    width: 180px;
    background: #050505;
    border-right: 1px solid #ff2b2b55;
    padding: 15px;
    box-sizing: border-box;
  }

  .sidebar-title {
    font-weight: bold;
    margin-bottom: 10px;
    color: #ff2b2b;
  }

  .side-link {
    display: block;
    margin: 8px 0;
    color: #ff2b2b;
    text-decoration: none;
    font-size: 14px;
  }

  .side-link.active {
    color: #fff;
    text-shadow: 0 0 10px #ff2b2b;
  }

  .container {
    margin-left: 200px;
    padding: 20px;
  }

  .search-bar {
    width: 80%;
    padding: 10px;
    font-size: 16px;
    background: #0a0a0a;
    border: 1px solid #ff2b2b;
    color: #ff2b2b;
    outline: none;
  }

  .private-info {
    margin-top: 10px;
    font-size: 14px;
    opacity: 0.7;
  }

  .vpn-box {
    margin-top: 15px;
    padding: 10px;
    width: 300px;
    border: 1px solid #ff2b2b55;
    background: #0a0a0a;
  }

  iframe {
    width: 100%;
    height: 80vh;
    margin-top: 20px;
    border: 1px solid #ff2b2b55;
    background: #111;
  }

  .glitch {
    animation: glitch 0.3s;
  }

  @keyframes glitch {
    0% { filter: blur(3px); }
    50% { filter: blur(8px); }
    100% { filter: blur(0px); }
  }
</style>
</head>

<body>

<div class="sidebar">
  <div class="sidebar-title">ABSOLUTE OS</div>

  <a class="side-link" href="index.html">Start</a>
  <a class="side-link" href="movies.html">Movies</a>
  <a class="side-link" href="games.html">Games</a>
  <a class="side-link" href="about.html">About</a>
  <a class="side-link active" href="search.html">Private Search</a>
</div>

<div class="container">

  <input id="searchInput" class="search-bar" placeholder="Search or enter URL...">

  <div class="private-info">
    PRIVATE MODE — NO HISTORY SAVED — NO COOKIES — NO TRACKING
  </div>

  <div class="vpn-box">
    VPN: <b style="color:#00ff00;">ACTIVE</b><br>
    PROXY: <b style="color:#00ff00;">ENABLED</b><br>
    TRACE: <b style="color:#00ff00;">BLOCKED</b>
  </div>

  <iframe id="browserFrame" src=""></iframe>

</div>

<script>
const input = document.getElementById("searchInput");
const frame = document.getElementById("browserFrame");

input.addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    let query = input.value.trim();

    // Glitch animation
    frame.classList.add("glitch");
    setTimeout(() => frame.classList.remove("glitch"), 300);

    // Detect if it's a URL
    if (query.startsWith("http://") || query.startsWith("https://")) {
      frame.src = query;
    } else if (query.includes(".")) {
      // If it looks like a domain
      frame.src = "https://" + query;
    } else {
      // Otherwise search it
      frame.src = "https://duckduckgo.com/?q=" + encodeURIComponent(query);
    }
  }
});
</script>

</body>
</html>
