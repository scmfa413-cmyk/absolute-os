<script>
const input = document.getElementById("searchInput");
const frame = document.getElementById("browserFrame");

function isURL(text) {
  return text.startsWith("http://") ||
         text.startsWith("https://") ||
         text.includes(".");
}

input.addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    let query = input.value.trim();
    if (!query) return;

    frame.classList.add("glitch");
    setTimeout(() => frame.classList.remove("glitch"), 300);

    let url;

    if (isURL(query)) {
      if (!query.startsWith("http")) {
        url = "https://" + query;
      } else {
        url = query;
      }
    } else {
      url = "https://www.startpage.com/sp/search?query=" + encodeURIComponent(query);
    }

    frame.src = url;

    // AUTO PROXY FALLBACK
    setTimeout(() => {
      try {
        let blocked = frame.contentWindow.location.href === "about:blank";
        if (blocked) {
          frame.src = "https://corsproxy.io/?" + url;
        }
      } catch (err) {
        frame.src = "https://corsproxy.io/?" + url;
      }
    }, 1200);
  }
});
</script>
<script>
const aiScreen = document.getElementById("ai-screen");
const openAI = document.getElementById("open-ai");
const closeAI = document.getElementById("close-ai");
const aiChat = document.getElementById("ai-chat");
const aiInput = document.getElementById("ai-input");

openAI.onclick = () => {
  aiScreen.style.display = "flex";
};

closeAI.onclick = () => {
  aiScreen.style.display = "none";
};

aiInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    const msg = aiInput.value.trim();
    if (!msg) return;

    aiChat.innerHTML += `<div><b>You:</b> ${msg}</div>`;
    aiInput.value = "";

    setTimeout(() => {
      aiChat.innerHTML += `<div><b>AI:</b> Processing your request inside Absolute OS...</div>`;
      aiChat.scrollTop = aiChat.scrollHeight;
    }, 300);
  }
});
</script>
