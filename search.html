<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Absolute OS – Private Searcher</title>

<style>
  body {
    margin: 0;
    background: #000;
    color: #ff2b2b;
    font-family: Consolas, monospace;
  }

  .sidebar {
    position: fixed;
    left: 0;
    top: 0;
    bottom: 0;
    width: 180px;
    background: #050505;
    border-right: 1px solid #ff2b2b55;
    padding: 15px;
    box-sizing: border-box;
  }

  .sidebar-title {
    font-weight: bold;
    margin-bottom: 10px;
    color: #ff2b2b;
  }

  .side-link {
    display: block;
    margin: 8px 0;
    color: #ff2b2b;
    text-decoration: none;
    font-size: 14px;
  }

  .side-link.active {
    color: #fff;
    text-shadow: 0 0 10px #ff2b2b;
  }

  .container {
    margin-left: 200px;
    padding: 20px;
  }

  .search-bar {
    width: 70%;
    padding: 10px;
    font-size: 16px;
    background: #0a0a0a;
    border: 1px solid #ff2b2b;
    color: #ff2b2b;
    outline: none;
  }

  .vpn-box {
    margin-top: 15px;
    padding: 10px;
    width: 300px;
    border: 1px solid #ff2b2b55;
    background: #0a0a0a;
  }

  iframe {
    width: 100%;
    height: 80vh;
    margin-top: 20px;
    border: 1px solid #ff2b2b55;
    background: #111;
  }

  /* FULLSCREEN AI ASSISTANT */
  #ai-screen {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: #000;
    color: #ff2b2b;
    font-family: Consolas, monospace;
    display: none;
    flex-direction: column;
    padding: 20px;
    box-sizing: border-box;
    z-index: 9999;
  }

  #ai-chat {
    flex-grow: 1;
    overflow-y: auto;
    border: 1px solid #ff2b2b55;
    padding: 15px;
    margin-bottom: 15px;
    background: #050505;
  }

  #ai-input {
    width: 100%;
    padding: 10px;
    background: #0a0a0a;
    border: 1px solid #ff2b2b55;
    color: #ff2b2b;
    outline: none;
  }

  #open-ai {
    margin-top: 20px;
    padding: 10px 20px;
    background: #ff2b2b;
    border: none;
    color: #000;
    font-weight: bold;
    cursor: pointer;
    font-family: Consolas;
    box-shadow: 0 0 10px #ff2b2b;
  }

  #close-ai {
    padding: 8px 16px;
    background: #ff2b2b;
    border: none;
    color: #000;
    font-weight: bold;
    cursor: pointer;
    margin-bottom: 20px;
    box-shadow: 0 0 10px #ff2b2b;
  }
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="sidebar-title">ABSOLUTE OS</div>
  <a class="side-link" href="index.html">Start</a>
  <a class="side-link" href="movies.html">Movies</a>
  <a class="side-link" href="games.html">Games</a>
  <a class="side-link" href="about.html">About</a>
  <a class="side-link" href="profile.html">Profile</a>
  <a class="side-link active" href="search.html">Private Search</a>
</div>

<!-- MAIN CONTENT -->
<div class="container">
  <h1>PRIVATE MODE — NO HISTORY — NO COOKIES — NO TRACKING</h1>

  <div class="vpn-box">
    VPN: ACTIVE<br>
    PROXY: AUTO<br>
    TRACE: BLOCKED
  </div>

  <!-- AI BUTTON -->
  <button id="open-ai">OPEN AI ASSISTANT</button>

  <!-- SEARCH BAR -->
  <input type="text" id="searchInput" class="search-bar" placeholder="Search privately...">

  <!-- IFRAME -->
  <iframe id="browserFrame"></iframe>
</div>

<!-- FULLSCREEN AI ASSISTANT -->
<div id="ai-screen">
  <button id="close-ai">BACK TO SEARCH</button>
  <div id="ai-chat"></div>
  <input id="ai-input" placeholder="Type your message...">
</div>

<script>
/* OPEN / CLOSE AI ASSISTANT */
document.getElementById("open-ai").onclick = () => {
  document.getElementById("ai-screen").style.display = "flex";
};

document.getElementById("close-ai").onclick = () => {
  document.getElementById("ai-screen").style.display = "none";
};

/* LOCAL AI (placeholder) */
const aiChat = document.getElementById("ai-chat");
const aiInput = document.getElementById("ai-input");

aiInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    const msg = aiInput.value.trim();
    if (!msg) return;

    aiChat.innerHTML += `<div><b>You:</b> ${msg}</div>`;
    aiInput.value = "";

    setTimeout(() => {
      aiChat.innerHTML += `<div><b>AI:</b> Processing your request inside Absolute OS...</div>`;
      aiChat.scrollTop = aiChat.scrollHeight;
    }, 300);
  }
});

/* FIXED SEARCH SYSTEM — NOW USING STARTPAGE */
document.getElementById("searchInput").addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    const query = this.value.trim();
    if (query) {
      const url = "https://www.startpage.com/sp/search?query=" + encodeURIComponent(query);
      document.getElementById("browserFrame").src = url;
    }
  }
});
</script>

</body>
</html>
