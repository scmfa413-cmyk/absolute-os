<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Absolute OS — Games Window</title>

<style>
  body {
    margin: 0;
    background: #0d0d0d;
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
  }

  /* Window container */
  .game-window {
    width: 85vw;
    height: 85vh;
    background: rgba(20, 20, 20, 0.85);
    backdrop-filter: blur(12px);
    border-radius: 14px;
    box-shadow: 0 0 20px #b86eff;
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.95);
    animation: popIn 0.3s ease forwards;
    overflow: hidden;
  }

  @keyframes popIn {
    from { transform: translate(-50%, -50%) scale(0.85); opacity: 0; }
    to { transform: translate(-50%, -50%) scale(1); opacity: 1; }
  }

  /* Title bar */
  .title-bar {
    height: 45px;
    background: rgba(30, 30, 30, 0.9);
    display: flex;
    align-items: center;
    padding: 0 12px;
    cursor: grab;
  }

  .title-bar:active {
    cursor: grabbing;
  }

  .title-text {
    flex: 1;
    color: white;
    font-size: 16px;
    font-weight: 600;
  }

  /* Window buttons */
  .window-btns {
    display: flex;
    gap: 10px;
  }

  .btn {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    cursor: pointer;
  }

  .close { background: #ff4b4b; }
  .minimize { background: #ffcc00; }
  .fullscreen { background: #6aff6a; }

  /* Iframe */
  iframe {
    width: 100%;
    height: calc(100% - 45px);
    border: none;
  }
</style>
</head>

<body>

<div class="game-window" id="gameWindow">
  <div class="title-bar" id="dragBar">
    <div class="title-text">Games — OnlineGames.io</div>

    <div class="window-btns">
      <div class="btn minimize" onclick="minimizeWindow()"></div>
      <div class="btn fullscreen" onclick="toggleFullscreen()"></div>
      <div class="btn close" onclick="closeWindow()"></div>
    </div>
  </div>

  <iframe src="https://www.onlinegames.io"></iframe>
</div>

<script>
  /* Dragging logic */
  const win = document.getElementById("gameWindow");
  const dragBar = document.getElementById("dragBar");
  let offsetX, offsetY, isDown = false;

  dragBar.addEventListener("mousedown", e => {
    isDown = true;
    offsetX = e.clientX - win.offsetLeft;
    offsetY = e.clientY - win.offsetTop;
  });

  document.addEventListener("mouseup", () => isDown = false);

  document.addEventListener("mousemove", e => {
    if (!isDown) return;
    win.style.left = `${e.clientX - offsetX}px`;
    win.style.top = `${e.clientY - offsetY}px`;
  });

  /* Close window */
  function closeWindow() {
    win.style.display = "none";
  }

  /* Minimize window */
  function minimizeWindow() {
    win.style.transform = "translate(-50%, -50%) scale(0.1)";
    win.style.opacity = "0";
    setTimeout(() => win.style.display = "none", 200);
  }

  /* Fullscreen toggle */
  let full = false;
  function toggleFullscreen() {
    full = !full;
    win.style.width = full ? "100vw" : "85vw";
    win.style.height = full ? "100vh" : "85vh";
    win.style.left = "50%";
    win.style.top = "50%";
    win.style.transform = "translate(-50%, -50%)";
  }
</script>

</body>
</html>
